<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule - IEEE YP Summit 2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/schedule.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<div
    id="site-header"
    data-title="Schedule"
    data-subtitle="IEEE Young Professionals Summit 2026">
</div>

<div id="site-nav"></div>

<div class="container">
    <div class="section">
    <div id="schedule-day-tabs" class="schedule-day-tabs"></div>
    <div id="schedule-track-filter" class="schedule-track-filter"></div>

    <div class="schedule-legend">
      <span class="schedule-legend-item"><span class="schedule-legend-swatch" style="background:#004f9f"></span>Sessions &amp; Talks</span>
      <span class="schedule-legend-item"><span class="schedule-legend-swatch" style="background:#c49a2c"></span>Meals &amp; Breaks</span>
      <span class="schedule-legend-item"><span class="schedule-legend-swatch" style="background:#862e91"></span>Social &amp; Networking</span>
    </div>

    <div id="schedule-timeline" class="schedule-timeline">
      <p>Loading schedule…</p>
    </div>

</div>
</div>

<div id="site-footer"></div>

<script src="scripts/load-components.js"></script>
<script src="scripts/schedule.js"></script>

</body>
</html>
